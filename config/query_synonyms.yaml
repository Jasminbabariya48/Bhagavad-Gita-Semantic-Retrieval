# ============================================================================
# Static thesaurus for query expansion (src/query_expansion.py).
# Keys are lowercase trigger words found in a user query; values are terms
# appended to the query before retrieval. Keep lists short and on-topic —
# noisy expansion hurts retrieval more than it helps.
# ============================================================================

